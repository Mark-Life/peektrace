name: Publish Desktop App

run-name: "publish desktop ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"

# DISABLED: desktop is not a distribution channel yet. The app now builds with
# Electrobun (system WebView, Bun main process) instead of Electron. This
# workflow builds the app per-OS and uploads the raw build artifacts for manual
# download; it does NOT yet publish an auto-update feed.
#
# Auto-update follow-up: Electrobun's updater pulls hash-based diff patches from
# a static host (`release.baseUrl` in electrobun.config.ts) — S3/R2/GitHub
# Releases serving the generated `artifacts/` folder — rather than the
# electron-updater `latest*.yml` model this workflow used to assemble. Wiring
# that up (host + baseUrl + `electrobun build --env=stable` artifact upload +
# code signing/notarization) is a separate pass.
#
# Each leg stamps the bare semver from the `desktop-v<tag>` into
# apps/desktop/package.json (electrobun.config reads it) and apps/cli so the
# bundled `peektrace --version` matches. Electrobun builds the current host only,
# so the matrix runs one leg per OS/arch on its native runner.

on:
  # push:
  #   tags:
  #     - "desktop-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g. desktop-v1.2.3)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-desktop-${{ github.ref }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            platform: mac
          - os: ubuntu-latest
            arch: x64
            platform: linux
          - os: windows-latest
            arch: x64
            platform: win

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Derive version from tag
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#desktop-v}"
          if ! printf '%s' "$VERSION" | grep -Eq '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "::error::Tag '$RELEASE_TAG' does not yield a valid semver (got '$VERSION'). Expected desktop-v<semver>." >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Building Peektrace desktop $VERSION"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Stamp desktop version
        run: npm pkg set version="$VERSION"
        working-directory: apps/desktop

      - name: Stamp CLI version
        run: npm pkg set version="$VERSION"
        working-directory: apps/cli

      - name: Build inspector UI
        run: bun run --filter=inspector build

      # `electrobun build` runs the preBuild hook (scripts/stage-sidecar.ts),
      # which compiles the CLI into a self-contained binary and stages it for
      # bundling, then produces the app + update artifacts under apps/desktop/artifacts.
      - name: Build desktop app
        run: bunx electrobun build --env=stable
        working-directory: apps/desktop

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: apps/desktop/artifacts/**
          if-no-files-found: warn
